<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Care Groups Debug Test</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Care Groups Debug Test</h1>
    <div id="output"></div>
    <div id="results"></div>

    <script>
        const { createClient } = supabase;
        
        // Initialize exactly like the app
        const supabaseClient = createClient(
            'https://yekarqanirdkdckimpna.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlla2FycWFuaXJka2Rja2ltcG5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQyNzUwOTQsImV4cCI6MjA1OTg1MTA5NH0.WQlbyilIuH_Vz_Oit-M5MZ9II9oqO7tg-ThkZ5GCtfc',
            {
                db: { schema: 'care_connector' },
                auth: {
                    persistSession: true,
                    autoRefreshToken: true,
                    detectSessionInUrl: true,
                    flowType: 'pkce',
                }
            }
        );

        function log(message) {
            console.log(message);
            document.getElementById('output').innerHTML += message + '<br>';
        }

        // Replicate getUserCareGroups function exactly
        async function getUserCareGroups(userId) {
            try {
                if (!userId) {
                    log('🔥 No userId provided to getUserCareGroups');
                    return [];
                }

                log('🔥 getUserCareGroups: Starting for userId: ' + userId);

                // SIMPLE TWO-STEP APPROACH - More reliable
                const { data: memberships, error: membershipError } = await supabaseClient
                    .from('care_group_members')
                    .select('group_id, role, joined_at')
                    .eq('user_id', userId);

                if (membershipError) {
                    log('🔥 getUserCareGroups: Membership error: ' + JSON.stringify(membershipError));
                    return [];
                }

                log('🔥 getUserCareGroups: Found memberships: ' + (memberships?.length || 0));

                if (!memberships || memberships.length === 0) {
                    log('🔥 getUserCareGroups: No memberships found');
                    return [];
                }

                const groupIds = memberships.map(m => m.group_id).filter(id => id !== null && id !== undefined);
                log('🔥 getUserCareGroups: Group IDs (filtered): ' + JSON.stringify(groupIds));

                if (groupIds.length === 0) {
                    log('🔥 getUserCareGroups: No valid group IDs found after filtering');
                    return [];
                }

                const { data: groupsData, error: groupsError } = await supabaseClient
                    .from('care_groups')
                    .select('*')
                    .in('id', groupIds);

                if (groupsError) {
                    log('🔥 getUserCareGroups: Groups error: ' + JSON.stringify(groupsError));
                    return [];
                }

                log('🔥 getUserCareGroups: Found groups data: ' + (groupsData?.length || 0));

                const finalGroups = groupsData.map(group => {
                    const membership = memberships.find(m => m.group_id === group.id);
                    return {
                        id: group.id,
                        name: group.name,
                        description: group.description,
                        category: group.category,
                        location: group.location,
                        privacy_setting: group.privacy_setting,
                        member_count: group.member_count || 1,
                        created_at: group.created_at,
                        avatar_url: group.avatar_url,
                        user_role: membership?.role || 'member',
                        joined_at: membership?.joined_at,
                        created_by: group.created_by,
                        members: [],
                        privacy_level: group.privacy_setting,
                        group_type: group.group_type,
                        updated_at: group.updated_at
                    };
                });

                log('🔥 getUserCareGroups: Returning final groups: ' + finalGroups.length);
                log('🔥 getUserCareGroups: Sample group names: ' + finalGroups.map(g => g.name).join(', '));
                return finalGroups;

            } catch (error) {
                log('🔥 UNEXPECTED ERROR in getUserCareGroups: ' + error.message);
                return [];
            }
        }

        async function testIsolated() {
            try {
                log('🔥 ISOLATED TEST: Starting debug...');
                
                // Check session
                const { data: { session }, error } = await supabaseClient.auth.getSession();
                
                if (error) {
                    log('❌ Session error: ' + JSON.stringify(error));
                    return;
                }
                
                if (!session?.user) {
                    log('❌ No session found - need to authenticate first');
                    return;
                }
                
                log('✅ Session found for user: ' + session.user.email);
                log('✅ User ID: ' + session.user.id);
                
                // Test getUserCareGroups with session user ID
                const groups = await getUserCareGroups(session.user.id);
                
                log('🎉 FINAL RESULT: ' + groups.length + ' groups returned');
                
                if (groups.length > 0) {
                    document.getElementById('results').innerHTML = 
                        '<h2>SUCCESS! Groups Found:</h2>' + 
                        groups.map(g => `<div>• ${g.name} (${g.user_role})</div>`).join('');
                } else {
                    document.getElementById('results').innerHTML = '<h2>❌ No groups returned</h2>';
                }
                
            } catch (error) {
                log('🔥 Test error: ' + error.message);
            }
        }

        // Run test when page loads
        window.addEventListener('load', testIsolated);
    </script>
</body>
</html>
